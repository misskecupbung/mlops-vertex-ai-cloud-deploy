# CI/CD pipeline for MLOps lab

steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-training'
    args: ['build', '-t', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/mlops-lab/trainer:${SHORT_SHA}',
           '-t', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/mlops-lab/trainer:latest',
           '-f', 'Dockerfile.training', '.']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-serving'
    args: ['build', '-t', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/mlops-lab/serving:${SHORT_SHA}',
           '-t', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/mlops-lab/serving:latest',
           '-f', 'Dockerfile.serving', '.']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-training'
    args: ['push', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/mlops-lab/trainer:${SHORT_SHA}']
    waitFor: ['build-training']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-serving'
    args: ['push', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/mlops-lab/serving:${SHORT_SHA}']
    waitFor: ['build-serving']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-latest'
    args: ['push', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/mlops-lab/serving:latest']
    waitFor: ['push-serving']

  - name: 'python:3.9'
    id: 'compile-pipeline'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install -r requirements.txt
        cd src && python compile_pipeline.py && mv pipeline.json ../
    waitFor: ['-']

  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'submit-pipeline'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install google-cloud-aiplatform kfp
        python src/submit_pipeline.py
    env:
      - 'PROJECT_ID=${PROJECT_ID}'
      - 'REGION=${_REGION}'
      - 'BUCKET_NAME=${PROJECT_ID}-mlops-lab'
    waitFor: ['compile-pipeline', 'push-serving']

  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'create-release'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        export PROJECT_NUMBER=$(gcloud projects describe ${PROJECT_ID} --format='value(projectNumber)')
        envsubst < clouddeploy.yaml > clouddeploy-rendered.yaml
        gcloud deploy apply --file=clouddeploy-rendered.yaml --region=${_REGION}
        gcloud deploy releases create release-${SHORT_SHA} \
          --project=${PROJECT_ID} --region=${_REGION} \
          --delivery-pipeline=mlops-model-pipeline \
          --images=serving-image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/mlops-lab/serving:${SHORT_SHA}
    waitFor: ['push-serving']

substitutions:
  _REGION: us-central1

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/mlops-lab/trainer:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/mlops-lab/serving:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/mlops-lab/serving:latest'
