# Cloud Build Configuration
# Defines the CI/CD workflow for the MLOps pipeline

steps:
  # Step 1: Build training container
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-training'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/mlops-lab/trainer:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/mlops-lab/trainer:latest'
      - '-f'
      - 'Dockerfile.training'
      - '.'

  # Step 2: Build serving container
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-serving'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/mlops-lab/serving:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/mlops-lab/serving:latest'
      - '-f'
      - 'Dockerfile.serving'
      - '.'

  # Step 3: Push training container
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-training'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/mlops-lab/trainer:${SHORT_SHA}'
    waitFor: ['build-training']

  # Step 4: Push serving container
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-serving'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/mlops-lab/serving:${SHORT_SHA}'
    waitFor: ['build-serving']

  # Step 5: Push latest tags
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-latest'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/mlops-lab/serving:latest'
    waitFor: ['push-serving']

  # Step 6: Install dependencies and compile pipeline
  - name: 'python:3.9'
    id: 'compile-pipeline'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install -r requirements.txt
        cd src && python compile_pipeline.py
        mv pipeline.json ../pipeline.json
    waitFor: ['-']

  # Step 7: Submit Vertex AI Pipeline
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'submit-pipeline'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install google-cloud-aiplatform kfp
        python src/submit_pipeline.py
    env:
      - 'PROJECT_ID=${PROJECT_ID}'
      - 'REGION=${_REGION}'
      - 'BUCKET_NAME=${PROJECT_ID}-mlops-lab'
    waitFor: ['compile-pipeline', 'push-serving']

  # Step 8: Create Cloud Deploy release
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'create-release'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # Substitute environment variables in clouddeploy.yaml
        export PROJECT_NUMBER=$(gcloud projects describe ${PROJECT_ID} --format='value(projectNumber)')
        envsubst < clouddeploy.yaml > clouddeploy-rendered.yaml
        
        # Apply Cloud Deploy configuration
        gcloud deploy apply \
          --file=clouddeploy-rendered.yaml \
          --region=${_REGION}
        
        # Create release
        gcloud deploy releases create release-${SHORT_SHA} \
          --project=${PROJECT_ID} \
          --region=${_REGION} \
          --delivery-pipeline=mlops-model-pipeline \
          --images=serving-image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/mlops-lab/serving:${SHORT_SHA}
    waitFor: ['push-serving']

substitutions:
  _REGION: us-central1

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/mlops-lab/trainer:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/mlops-lab/serving:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/mlops-lab/serving:latest'
