# Kubernetes Deployment for Model Serving
apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-serving
  labels:
    app: model-serving
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: model-serving
  template:
    metadata:
      labels:
        app: model-serving
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: model-serving-sa
      containers:
        - name: model-serving
          image: serving-image
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: MODEL_VERSION
              value: "v1"
            - name: MODEL_URI
              valueFrom:
                configMapKeyRef:
                  name: model-config
                  key: model_uri
                  optional: true
            - name: PORT
              value: "8080"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /live
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
      terminationGracePeriodSeconds: 30
---
# Service Account
# NOTE: The annotation must match your project's service account
# Format: model-serving-gsa@PROJECT_ID.iam.gserviceaccount.com
apiVersion: v1
kind: ServiceAccount
metadata:
  name: model-serving-sa
  annotations:
    iam.gke.io/gcp-service-account: "model-serving-gsa@PROJECT_ID.iam.gserviceaccount.com"
---
# ConfigMap for model configuration
# NOTE: Update model_uri with your actual bucket path after running the pipeline
# Format: gs://${PROJECT_ID}-mlops-lab/models/iris-classifier
apiVersion: v1
kind: ConfigMap
metadata:
  name: model-config
data:
  model_uri: "gs://PROJECT_ID-mlops-lab/models/iris-classifier"
