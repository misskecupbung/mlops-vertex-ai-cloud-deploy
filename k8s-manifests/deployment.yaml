# Model serving deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-serving
  labels:
    app: model-serving
spec:
  replicas: 2
  selector:
    matchLabels:
      app: model-serving
  template:
    metadata:
      labels:
        app: model-serving
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      serviceAccountName: model-serving-sa
      containers:
        - name: model-serving
          image: serving-image
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: MODEL_VERSION
              value: "v1"
            - name: MODEL_URI
              valueFrom:
                configMapKeyRef:
                  name: model-config
                  key: model_uri
                  optional: true
            - name: PORT
              value: "8080"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /live
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
      terminationGracePeriodSeconds: 30
# Note: ServiceAccount and ConfigMap must be pre-created in each namespace
