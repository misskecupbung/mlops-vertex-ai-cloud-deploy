# Kubernetes Deployment for Model Serving
apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-serving
  labels:
    app: model-serving
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: model-serving
  template:
    metadata:
      labels:
        app: model-serving
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: model-serving-sa
      containers:
        - name: model-serving
          image: serving-image
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: MODEL_VERSION
              value: "v1"
            - name: MODEL_URI
              valueFrom:
                configMapKeyRef:
                  name: model-config
                  key: model_uri
                  optional: true
            - name: PORT
              value: "8080"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /live
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
      terminationGracePeriodSeconds: 30
# NOTE: ServiceAccount and ConfigMap are NOT included here.
# They must be pre-created in each namespace BEFORE deploying.
# See README Step 3.4 for instructions.
