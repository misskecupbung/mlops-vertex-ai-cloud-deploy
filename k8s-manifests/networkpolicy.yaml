# Network Policy for Model Serving
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: model-serving-network-policy
spec:
  podSelector:
    matchLabels:
      app: model-serving
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from LoadBalancer
    - ports:
        - protocol: TCP
          port: 8080
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
    # Allow HTTPS for GCS access
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
