# Kubernetes Service for Model Serving
apiVersion: v1
kind: Service
metadata:
  name: model-serving
  labels:
    app: model-serving
spec:
  type: LoadBalancer
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: model-serving
---
# Internal service for cluster-internal communication
apiVersion: v1
kind: Service
metadata:
  name: model-serving-internal
  labels:
    app: model-serving
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: model-serving
