# Cloud Deploy config - single GKE cluster with staging/production namespaces

apiVersion: deploy.cloud.google.com/v1
kind: DeliveryPipeline
metadata:
  name: mlops-model-pipeline
description: "Iris model deployment pipeline"
serialPipeline:
  stages:
    - targetId: staging
      profiles: [staging]
      strategy:
        standard:
          verify: false
    - targetId: production
      profiles: [production]
      strategy:
        standard:
          verify: false
---
apiVersion: deploy.cloud.google.com/v1
kind: Target
metadata:
  name: staging
description: "Staging (namespace: staging)"
gke:
  cluster: projects/${PROJECT_ID}/locations/${REGION}/clusters/mlops-cluster
  internalIp: false
executionConfigs:
  - usages: [RENDER, DEPLOY]
    defaultPool:
      serviceAccount: ${PROJECT_NUMBER}-compute@developer.gserviceaccount.com
deployParameters:
  deploy-namespace: staging
---
apiVersion: deploy.cloud.google.com/v1
kind: Target
metadata:
  name: production
description: "Production (namespace: production)"
requireApproval: true
gke:
  cluster: projects/${PROJECT_ID}/locations/${REGION}/clusters/mlops-cluster
  internalIp: false
executionConfigs:
  - usages: [RENDER, DEPLOY]
    defaultPool:
      serviceAccount: ${PROJECT_NUMBER}-compute@developer.gserviceaccount.com
deployParameters:
  deploy-namespace: production
